<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lettercubie — Speedrun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== ÉCRAN START ===================== -->
  <div id="screen-start" class="screen active">
    <div class="start-inner">

      <div class="logo-block">
        <span class="logo-tag">&lt;LETTERCUBIE&gt;</span>
        <h1>SPEEDRUN</h1>
        <span class="logo-tag">&lt;/LETTERCUBIE&gt;</span>
      </div>

      <div class="options-panel">

        <!-- Filtre par face — fermé par défaut -->
        <details class="opt-group opt-schema">
          <summary class="opt-summary">
            <span class="opt-legend">FACES</span>
            <span class="opt-summary-arrow">▾</span>
          </summary>
          <div class="check-col">
            <div class="face-row">
              <label class="face-label-btn">
                <input type="checkbox" name="opt-face" value="U" checked />
                <span class="face-box" style="--face-color:#FFFFFF; --face-text:#111;">U</span>
              </label>
              <label class="face-label-btn">
                <input type="checkbox" name="opt-face" value="D" checked />
                <span class="face-box" style="--face-color:#FEFE00; --face-text:#111;">D</span>
              </label>
              <label class="face-label-btn">
                <input type="checkbox" name="opt-face" value="F" checked />
                <span class="face-box" style="--face-color:#00D800; --face-text:#111;">F</span>
              </label>
              <label class="face-label-btn">
                <input type="checkbox" name="opt-face" value="B" checked />
                <span class="face-box" style="--face-color:#0000F2; --face-text:#fff;">B</span>
              </label>
              <label class="face-label-btn">
                <input type="checkbox" name="opt-face" value="R" checked />
                <span class="face-box" style="--face-color:#EE0000; --face-text:#fff;">R</span>
              </label>
              <label class="face-label-btn">
                <input type="checkbox" name="opt-face" value="L" checked />
                <span class="face-box" style="--face-color:#FFA100; --face-text:#111;">L</span>
              </label>
            </div>
            <div class="face-shortcuts">
              <button type="button" class="btn-ghost" id="btn-all-faces">Tout</button>
              <button type="button" class="btn-ghost" id="btn-no-faces">Aucun</button>
            </div>
          </div>
        </details>

        <!-- Nombre de cartes -->
        <fieldset class="opt-group">
          <legend class="opt-legend">CARTES PAR RUN</legend>
          <div class="radio-row">
            <label class="radio-label">
              <input type="radio" name="opt-count" value="5" />
              <span class="radio-box"></span>
              5
            </label>
            <label class="radio-label">
              <input type="radio" name="opt-count" value="10" />
              <span class="radio-box"></span>
              10
            </label>
            <label class="radio-label">
              <input type="radio" name="opt-count" value="20" />
              <span class="radio-box"></span>
              20
            </label>
            <label class="radio-label">
              <input type="radio" name="opt-count" value="all" checked />
              <span class="radio-box"></span>
              Tout
            </label>
          </div>
        </fieldset>

        <!-- Options comportement -->
        <fieldset class="opt-group">
          <legend class="opt-legend">OPTIONS</legend>
          <div class="check-col">

            <label class="check-label">
              <input type="checkbox" id="opt-requeue" checked />
              <span class="check-box"></span>
              <span class="check-text">
                Remettre les erreurs dans le paquet
                <span class="check-hint">La carte réapparaît aléatoirement plus tard</span>
              </span>
            </label>

            <label class="check-label">
              <input type="checkbox" id="opt-rotate" checked />
              <span class="check-box"></span>
              <span class="check-text">
                Rotation aléatoire du cube
                <span class="check-hint">Orientation différente à chaque carte</span>
              </span>
            </label>

          </div>
        </fieldset>

      </div>

      <div class="deck-info">
        <span id="deck-count"></span> cartes au total &bull; shuffle aléatoire
      </div>

      <button id="btn-start" class="btn-primary">START</button>

    </div>
  </div>

  <!-- ===================== ÉCRAN COUNTDOWN ===================== -->
  <div id="screen-countdown" class="screen">
    <div id="countdown-number" class="countdown-number">3</div>
  </div>

  <!-- ===================== ÉCRAN QUIZ ===================== -->
  <div id="screen-quiz" class="screen">

    <header class="quiz-header">
      <div class="hud-block">
        <span class="hud-label">TEMPS</span>
        <span id="timer" class="hud-value timer-value">00:00.0</span>
      </div>
      <div class="hud-block hud-center">
        <span class="hud-label">CARTE</span>
        <span id="progress-text" class="hud-value">1 / 48</span>
        <div id="progress-bar-wrap">
          <div id="progress-bar"></div>
        </div>
      </div>
      <div class="hud-block hud-right">
        <span class="hud-label">ERREURS</span>
        <span id="error-count" class="hud-value">0</span>
      </div>
    </header>

    <main class="quiz-main">
      <div id="card-area">
        <div id="position-label"></div>
        <div id="svg-container"></div>
        <div id="input-row">
          <input
            id="answer-input"
            type="text"
            maxlength="1"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            placeholder="_"
          />
          <div id="feedback" class="feedback"></div>
        </div>
      </div>
    </main>

  </div>

  <!-- ===================== ÉCRAN RÉSULTATS ===================== -->
  <div id="screen-results" class="screen">
    <div class="results-inner">

      <h2 class="results-title">RÉSULTATS</h2>

      <div class="score-block">
        <div class="score-circle">
          <span id="score-value">--</span>
          <span class="score-label">/ 100</span>
        </div>
        <div id="score-grade" class="score-grade"></div>
      </div>

      <div class="stats-row">
        <div class="stat-block">
          <span class="stat-label">TEMPS TOTAL</span>
          <span id="stat-total-time" class="stat-value">--</span>
        </div>
        <div class="stat-block">
          <span class="stat-label">ERREURS TOTALES</span>
          <span id="stat-errors" class="stat-value">--</span>
        </div>
        <div class="stat-block">
          <span class="stat-label">MOY / CARTE</span>
          <span id="stat-avg" class="stat-value">--</span>
        </div>
      </div>

      <div class="results-table-wrap">
        <table id="results-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Position</th>
              <th>Réponse</th>
              <th>Temps</th>
              <th>Essais</th>
            </tr>
          </thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>

      <button id="btn-restart" class="btn-primary">REJOUER</button>

    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
